services:
  redis:
    image: redis:7
    container_name: medbill-redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: medbill-backend
    ports:
      - "5001:8080"
    environment:
      - SECRET_KEY=change-this-secret
      - REDIS_URL=redis://redis:6379/0
      - ANTHROPIC_API_KEY=replace-with-real-key-on-vm-only
      - FRONTEND_URL=http://34.171.216.159
      - CLAUDE_EXTRACTION_MODEL=claude-haiku-4-5-20251001
      - FUNDER_MEDICARE_MULTIPLIER=1.60
      - LAW_FIRM_SPREAD_PERCENT=0.60
      - DEFAULT_NEGOTIATED_RATE_MULTIPLIER=1.00
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
      args:
        # Must be the URL the BROWSER can reach — VM public IP + backend port
        NEXT_PUBLIC_API_URL: http://34.171.216.159:5001
    container_name: medbill-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
